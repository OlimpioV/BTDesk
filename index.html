<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BTDesk - Controle seu dia</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bt-navy:#253f4f;--bt-navy-dark:#1a2e3a;
  --bt-orange:#fa510e;--bt-grad:linear-gradient(135deg,#ff8204,#fa510e,#e20500);
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --border:#e2e8f0;--surface:#f1f5f9;--white:#fff;
  --shadow:0 1px 3px rgba(0,0,0,0.07);
  --shadow-md:0 4px 16px rgba(0,0,0,0.10);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.18);
  --col-w:272px;
}
html,body{height:100%;}
body{background:#253f4f;color:var(--text);font-family:'Work Sans',-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden;}
input,select,textarea{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--bt-orange);box-shadow:0 0 0 3px rgba(250,81,14,.12);}
label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:5px;}
button{font-family:inherit;cursor:pointer;}
.btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;border:1.5px solid var(--border);background:#fff;color:var(--text2);transition:all .18s;}
.btn:hover{background:var(--surface);}
.btn-primary{background:var(--bt-navy);color:#fff;border-color:var(--bt-navy);font-weight:600;}
.btn-primary:hover{background:var(--bt-navy-dark);}
.btn-accent{background:var(--bt-grad);color:#fff;border:none;font-weight:600;}
.btn-accent:hover{opacity:.9;}
.btn-danger{background:#fef2f2;color:#dc2626;border-color:#fecaca;}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.field{margin-bottom:16px;}
.tab{padding:10px 16px;font-size:13px;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,.45);border-bottom:2px solid transparent;transition:all .18s;}
.tab:hover{color:rgba(255,255,255,.75);}
.tab.active{color:#fff;border-bottom-color:var(--bt-orange);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;display:none;z-index:9999;box-shadow:var(--shadow-lg);}
.toast.show{display:block;}
.view-btn{padding:6px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);font-size:12px;transition:all .18s;display:flex;align-items:center;gap:4px;}
.view-btn:hover{color:#fff;border-color:rgba(255,255,255,.3);}
.view-btn.active{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.3);}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
#app.page-mode{overflow:auto;height:auto;min-height:100vh;background:var(--surface);}

/* BOARD */
.board-outer{flex:1;overflow-x:auto;overflow-y:hidden;padding:10px 12px 14px;}
.board-inner{display:flex;gap:10px;align-items:flex-start;height:100%;min-width:max-content;}

/* COLUMN */
.col-wrap{width:var(--col-w);min-width:var(--col-w);display:flex;flex-direction:column;background:rgba(255,255,255,.09);border-radius:14px;max-height:calc(100vh - 124px);}
.col-header{padding:10px 10px 8px;display:flex;align-items:center;gap:6px;flex-shrink:0;position:relative;}
.col-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.9);flex:1;cursor:default;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.col-title[data-editable="true"]{cursor:pointer;}
.col-title[data-editable="true"]:hover{color:#fff;}
.col-title-input{font-size:13px;font-weight:700;color:#fff;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.4);border-radius:6px;padding:2px 7px;width:100%;outline:none;font-family:inherit;}
.col-count{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);background:rgba(0,0,0,.18);border-radius:20px;padding:1px 8px;flex-shrink:0;}
.col-cards{overflow-y:auto;overflow-x:hidden;flex:1;padding:2px 7px 8px;}
.col-cards::-webkit-scrollbar{width:4px;}
.col-cards::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px;}

/* COLOR PICKER POPUP */
.col-color-picker{position:absolute;top:36px;left:8px;background:#fff;border-radius:12px;padding:12px;box-shadow:var(--shadow-lg);z-index:50;display:flex;gap:8px;flex-wrap:wrap;width:180px;}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s;}
.color-swatch:hover,.color-swatch.active{transform:scale(1.25);border-color:#fff;}

/* ADD COLUMN */
.add-col-btn{width:var(--col-w);min-width:var(--col-w);height:42px;border-radius:12px;background:rgba(255,255,255,.07);border:1.5px dashed rgba(255,255,255,.2);color:rgba(255,255,255,.45);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all .18s;flex-shrink:0;align-self:flex-start;}
.add-col-btn:hover{background:rgba(255,255,255,.13);color:rgba(255,255,255,.85);}

/* CARD */
.card-item{background:#fff;border-radius:10px;margin-bottom:7px;cursor:pointer;transition:box-shadow .15s,transform .1s,opacity .15s;box-shadow:0 1px 3px rgba(0,0,0,.12);overflow:hidden;user-select:none;}
.card-item:hover{box-shadow:0 4px 14px rgba(0,0,0,.2);transform:translateY(-1px);}
.card-item.dragging{opacity:.25;cursor:grabbing;}
.card-drop-indicator{height:5px;border-radius:4px;background:var(--bt-orange);margin-bottom:7px;opacity:0;transition:opacity .1s;}
.card-drop-indicator.active{opacity:1;}
.card-cover{height:34px;width:100%;display:block;}
.card-body{padding:9px 11px 10px;}
.card-title{font-weight:600;font-size:13px;color:#172b4d;line-height:1.4;margin-bottom:6px;}
.card-obs{font-size:11px;color:#5e6c84;line-height:1.4;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-labels{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
.card-label-bar{height:8px;min-width:40px;border-radius:4px;display:inline-block;cursor:pointer;transition:min-width .15s;}
.card-label-bar.expanded{min-width:auto;height:20px;border-radius:4px;padding:0 8px;display:inline-flex;align-items:center;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:3px;}
.card-chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:#5e6c84;background:#f4f5f7;border-radius:4px;padding:2px 6px;font-weight:500;}
.card-cc{display:inline-flex;font-size:11px;font-weight:700;color:#5e6c84;background:#f4f5f7;border-radius:4px;padding:2px 6px;}
.drop-zone.drag-over-empty{background:rgba(255,255,255,.07);border-radius:10px;outline:2px dashed rgba(255,255,255,.18);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;z-index:200;overflow-y:auto;padding:20px 16px;}
.modal-trello{background:#f4f5f7;border-radius:18px;width:min(96vw,780px);box-shadow:var(--shadow-lg);overflow:hidden;margin:auto;}
.modal-cover{height:108px;width:100%;position:relative;}
.modal-cover-close{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.25);border:none;color:#fff;border-radius:8px;padding:6px 9px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:5px;}
.modal-cover-close:hover{background:rgba(0,0,0,.45);}
.modal-body{display:grid;grid-template-columns:1fr 210px;}
.modal-main{padding:18px 22px 26px;min-width:0;}
.modal-side{background:#ebecf0;padding:14px 10px;display:flex;flex-direction:column;gap:6px;}
.modal-side-label{font-size:10px;font-weight:700;color:#5e6c84;text-transform:uppercase;letter-spacing:.06em;padding:0 2px;margin-top:4px;}
.modal-side-btn{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;padding:7px 10px;border-radius:8px;border:none;background:rgba(9,30,66,.08);color:#172b4d;width:100%;text-align:left;cursor:pointer;transition:background .15s;}
.modal-side-btn:hover{background:rgba(9,30,66,.16);}
.modal-section{margin-bottom:16px;}
.modal-sec-title{font-size:11px;font-weight:700;color:#5e6c84;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:5px;}

/* INLINE EDIT FIELDS */
.inline-title{font-size:19px;font-weight:700;color:#172b4d;line-height:1.3;padding:4px 6px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:border-color .15s,background .15s;word-break:break-word;}
.inline-title:hover{background:rgba(9,30,66,.06);border-color:transparent;}
.inline-title.editing{display:none;}
.inline-title-input{font-size:19px;font-weight:700;color:#172b4d;line-height:1.3;padding:4px 6px;border-radius:6px;border:2px solid var(--bt-orange);background:#fff;width:100%;resize:none;font-family:inherit;display:none;}
.inline-title-input.editing{display:block;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.info-cell{background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer;border:2px solid transparent;transition:border-color .15s;}
.info-cell:hover{border-color:var(--bt-orange);}
.info-cell.editing{border-color:var(--bt-orange);padding:5px 8px;}
.info-cell-label{font-size:10px;font-weight:700;color:#5e6c84;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.info-cell-val{font-size:13px;font-weight:600;color:#172b4d;}
.info-cell input,.info-cell select{padding:4px 7px;font-size:13px;border-radius:6px;margin-top:3px;}
.obs-block{background:#fff;border-radius:8px;padding:10px 12px;cursor:pointer;border:2px solid transparent;transition:border-color .15s;min-height:40px;}
.obs-block:hover{border-color:var(--bt-orange);}
.obs-block.editing{border-color:var(--bt-orange);}
.obs-text{font-size:13px;color:#5e6c84;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.obs-placeholder{font-size:13px;color:#94a3b8;font-style:italic;}
.obs-textarea{width:100%;border:none;background:transparent;font-size:13px;color:#5e6c84;line-height:1.6;resize:vertical;min-height:60px;padding:0;font-family:inherit;outline:none;}

/* STATUS SELECT IN SIDE */
.status-select{font-size:12px;font-weight:600;padding:7px 10px;border-radius:8px;border:none;width:100%;font-family:inherit;cursor:pointer;text-align:left;}

/* COMMENT */
.comment-wrap{background:#fff;border-radius:9px;border:1.5px solid var(--border);padding:8px 10px;margin-bottom:9px;transition:border-color .2s;}
.comment-wrap:focus-within{border-color:var(--bt-orange);}
.comment-wrap textarea{border:none;padding:0;background:transparent;font-size:13px;resize:none;min-height:32px;width:100%;}
.comment-wrap textarea:focus{box-shadow:none;}

/* MODAL SIMPLES */
.modal-box{background:#fff;border-radius:18px;padding:26px 30px;width:min(95vw,540px);max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}

/* TOOLBAR */
.toolbar{padding:0 12px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.18);border-bottom:1px solid rgba(255,255,255,.05);min-height:44px;gap:8px;flex-wrap:wrap;flex-shrink:0;}
.toolbar select,.toolbar input[type="number"]{font-size:12px;padding:4px 8px;border-radius:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);color:#fff;width:auto;}
.toolbar select option{background:#253f4f;color:#fff;}

/* AUTOCOMPLETE */
.autocomplete-wrap{position:relative;}
.autocomplete-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid var(--bt-orange);border-radius:10px;z-index:100;max-height:200px;overflow-y:auto;box-shadow:var(--shadow-md);}
.autocomplete-item{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item:hover,.autocomplete-item.active{background:rgba(250,81,14,.06);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(37,63,79,.2);border-radius:10px;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div id="modal-container"></div>
<script>
const SB="https://ubgazsabtzdutgibrxbs.supabase.co";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InViZ2F6c2FidHpkdXRnaWJyeGJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjMxMDUsImV4cCI6MjA5MDczOTEwNX0.0O7vDwiL7uxr5uVSa9yGkx9bULtmkdV6p3CXbPFt7eI";
const H={"Content-Type":"application/json","apikey":SK,"Authorization":"Bearer "+SK};

const COL_COLORS=[
  {dot:"#3b82f6",cover:"#bfdbfe"},{dot:"#f59e0b",cover:"#fde68a"},
  {dot:"#22c55e",cover:"#bbf7d0"},{dot:"#a855f7",cover:"#e9d5ff"},
  {dot:"#ec4899",cover:"#fbcfe8"},{dot:"#ef4444",cover:"#fecaca"},
  {dot:"#14b8a6",cover:"#99f6e4"},{dot:"#f97316",cover:"#fed7aa"},
  {dot:"#6366f1",cover:"#c7d2fe"},{dot:"#84cc16",cover:"#d9f99d"},
];

const COLS_DEFAULT=[
  {id:"aberto",    label:"Não iniciado",dot:"#3b82f6",cover:"#bfdbfe",badgeBg:"#dbeafe",badgeText:"#1d4ed8",ordem:0},
  {id:"andamento", label:"Em andamento",dot:"#f59e0b",cover:"#fde68a",badgeBg:"#fef3c7",badgeText:"#b45309",ordem:1},
  {id:"pausado",   label:"Pausado",     dot:"#a855f7",cover:"#e9d5ff",badgeBg:"#f3e8ff",badgeText:"#7e22ce",ordem:2},
  {id:"concluido", label:"Concluído",   dot:"#22c55e",cover:"#bbf7d0",badgeBg:"#dcfce7",badgeText:"#15803d",ordem:3},
];
let COLS=[...COLS_DEFAULT];

const ETIQUETAS_KEY="bari_etiquetas_v1";
const TC_DEFAULT={
  Assembleia:{bg:"#EEEDFE",border:"#534AB7",text:"#3C3489",cover:"#c4b5fd"},
  Aditamentos:{bg:"#FAEEDA",border:"#BA7517",text:"#633806",cover:"#fcd34d"},
  Oferta:     {bg:"#E1F5EE",border:"#0F6E56",text:"#085041",cover:"#6ee7b7"},
  Interno:    {bg:"#FAECE7",border:"#993C1D",text:"#712B13",cover:"#fca5a5"},
};
const PALETA=[
  {bg:"#EEEDFE",border:"#534AB7",text:"#3C3489",cover:"#c4b5fd"},
  {bg:"#FAEEDA",border:"#BA7517",text:"#633806",cover:"#fcd34d"},
  {bg:"#E1F5EE",border:"#0F6E56",text:"#085041",cover:"#6ee7b7"},
  {bg:"#FAECE7",border:"#993C1D",text:"#712B13",cover:"#fca5a5"},
  {bg:"#E6F1FB",border:"#185FA5",text:"#0C447C",cover:"#93c5fd"},
  {bg:"#FEF9C3",border:"#A16207",text:"#713F12",cover:"#fde68a"},
  {bg:"#FCE7F3",border:"#9D174D",text:"#831843",cover:"#f9a8d4"},
  {bg:"#ECFDF5",border:"#065F46",text:"#064E3B",cover:"#6ee7b7"},
];

let cards=[],perfil=null,nomeUser=null,emailUser=null,userDbId=null;
let filterResp="",filterTipo="",filterStatus="",filterCliente="",filterCaso="";
let viewMode="kanban";
let dragCardId=null,_dragOverColId=null,_dragOverIdx=null;
let editingId=null,formTipos=[];
let TC=Object.assign({},TC_DEFAULT),TIPOS=Object.keys(TC);
let corSelecionada=0,editingEtiqueta=null;
let modalCardId=null,editingCommentId=null;
let responsaveis=[],clientesDB=[],casosDB=[];
let acIndex=-1;
let labelsExpanded={};
let colorPickerOpen=null; // colId

function trunc(s,n){return s&&s.length>n?s.substring(0,n)+"...":s||"";}
function escQ(s){return (s||"").replace(/'/g,"\\'");}
function numFromStr(s){var m=(s||"").match(/^(\d+)/);return m?parseInt(m[1]):null;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function loadEtiquetas(){try{var s=localStorage.getItem(ETIQUETAS_KEY);if(s){Object.assign(TC,JSON.parse(s));TIPOS=Object.keys(TC);}}catch(e){}}
function saveEtiquetas(){var ex={};Object.keys(TC).forEach(function(k){if(!TC_DEFAULT[k])ex[k]=TC[k];});localStorage.setItem(ETIQUETAS_KEY,JSON.stringify(ex));}
function toast(msg,err){var el=document.getElementById("toast");el.textContent=msg;el.style.background=err?"#dc2626":"#253f4f";el.style.color="#fff";el.classList.add("show");setTimeout(function(){el.classList.remove("show");},3000);}

// ── DB ──
async function dbFetch(){var r=await fetch(SB+"/rest/v1/demandas?select=id,data",{headers:H});if(!r.ok)throw new Error("Erro "+r.status);return (await r.json()).map(function(r){return Object.assign({id:r.id},r.data);});}
async function dbUpsert(card){var id=card.id,data=Object.assign({},card);delete data.id;var r=await fetch(SB+"/rest/v1/demandas",{method:"POST",headers:Object.assign({"Prefer":"resolution=merge-duplicates"},H),body:JSON.stringify({id,data})});if(!r.ok)throw new Error("Erro "+r.status);}
async function dbDelete(id){var r=await fetch(SB+"/rest/v1/demandas?id=eq."+id,{method:"DELETE",headers:H});if(!r.ok)throw new Error();}
async function dbLog(acao,detalhe){await fetch(SB+"/rest/v1/logs",{method:"POST",headers:H,body:JSON.stringify({perfil,acao,detalhe})});}
async function dbFetchLogs(){var r=await fetch(SB+"/rest/v1/logs?select=*&order=criado_em.desc&limit=100",{headers:H});if(!r.ok)throw new Error();return r.json();}
async function dbFetchUsuarios(){var r=await fetch(SB+"/rest/v1/usuarios?select=*&order=nome",{headers:H});if(!r.ok)throw new Error();return r.json();}
async function dbSaveUsuario(u){var r=await fetch(SB+"/rest/v1/usuarios",{method:"POST",headers:Object.assign({"Prefer":"resolution=merge-duplicates"},H),body:JSON.stringify(u)});if(!r.ok)throw new Error();}
async function dbDeleteUsuario(id){var r=await fetch(SB+"/rest/v1/usuarios?id=eq."+id,{method:"DELETE",headers:H});if(!r.ok)throw new Error();}
async function dbSaveCols(){var data={colunas:COLS};await fetch(SB+"/rest/v1/demandas",{method:"POST",headers:Object.assign({"Prefer":"resolution=merge-duplicates"},H),body:JSON.stringify({id:"__cols__",data})});}
async function dbLoadCols(){var r=await fetch(SB+"/rest/v1/demandas?id=eq.__cols__&select=data",{headers:H});if(!r.ok)return;var rows=await r.json();if(rows&&rows[0]&&rows[0].data&&rows[0].data.colunas)COLS=rows[0].data.colunas;}
async function loadResponsaveis(){try{var r=await fetch(SB+"/rest/v1/usuarios?ativo=eq.true&select=sigla,nome,perfil",{headers:H});if(!r.ok)return;var rows=await r.json();responsaveis=rows.filter(function(u){return u.sigla&&(u.perfil==="advogado"||u.perfil==="mestre");}).map(function(u){return u.sigla;});}catch(e){}}
async function loadClientes(){try{var all=[],from=0,chunk=1000;while(true){var r=await fetch(SB+"/rest/v1/clientes?select=*&order=numero&limit="+chunk+"&offset="+from,{headers:Object.assign({"Range-Unit":"items"},H)});if(!r.ok)break;var rows=await r.json();all=all.concat(rows);if(rows.length<chunk)break;from+=chunk;}clientesDB=all;}catch(e){}}
async function loadCasos(){try{var all=[],from=0,chunk=1000;while(true){var r=await fetch(SB+"/rest/v1/casos?select=*&order=numero&limit="+chunk+"&offset="+from,{headers:Object.assign({"Range-Unit":"items"},H)});if(!r.ok)break;var rows=await r.json();all=all.concat(rows);if(rows.length<chunk)break;from+=chunk;}casosDB=all;}catch(e){}}

  try{
    var r=await fetch(SB+"/rest/v1/usuarios?email=eq."+encodeURIComponent(email)+"&senha=eq."+encodeURIComponent(senha)+"&ativo=eq.true&select=*",{headers:H});
    var rows=await r.json();if(!rows||!rows.length){renderLogin("E-mail ou senha incorretos.");return;}
    var u=rows[0];perfil=u.perfil;nomeUser=u.nome;emailUser=u.email;userDbId=u.id;

function clienteNome(num){var c=clientesDB.find(function(c){return c.numero===num;});return c?c.nome:"";}
function casoDesc(num,cliNum){var cl=clientesDB.find(function(c){return c.numero===cliNum;});if(!cl)return "";var ca=casosDB.find(function(c){return c.numero===num&&c.cliente_id===cl.id;});return ca?ca.descricao:"";}
function casosDoCliente(cliNum){var cl=clientesDB.find(function(c){return c.numero===cliNum;});if(!cl)return [];return casosDB.filter(function(c){return c.cliente_id===cl.id;});}
function getFiltered(){return cards.filter(function(c){return (!filterResp||c.responsavel===filterResp)&&(!filterTipo||(c.tipos&&c.tipos.includes(filterTipo)))&&(!filterStatus||c.status===filterStatus)&&(!filterCliente||String(c.clienteNum)===String(filterCliente))&&(!filterCaso||String(c.casoNum)===String(filterCaso));}).sort(function(a,b){return (a.ordem||0)-(b.ordem||0);});}
function getCardCoverColor(card){if(card.tipos&&card.tipos.length){var tc=TC[card.tipos[0]];if(tc&&tc.cover)return tc.cover;}var col=COLS.find(function(c){return c.id===card.status;});return col?col.cover:"#e2e8f0";}
function tipoTagsHTML(tipos){if(!tipos||!tipos.length)return "";return tipos.map(function(t){var c=TC[t]||PALETA[0];return '<span style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:4px;background:'+c.bg+';border:1px solid '+c.border+';color:'+c.text+';">'+t+'</span>';}).join("");}
function ccLabelHTML(card){if(card.clienteNum&&card.casoNum)return '<span class="card-cc">'+card.clienteNum+'/'+card.casoNum+'</span>';if(card.clienteNum)return '<span class="card-cc">'+card.clienteNum+'</span>';return "";}
async function salvarOrdemCol(col){var saves=[];col.forEach(function(c,i){if(c.ordem!==i){c.ordem=i;saves.push(dbUpsert(c));}});await Promise.all(saves);}

// ── DRAG & DROP ──
function onDragStart(e,id){dragCardId=id;e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",id);setTimeout(function(){var el=document.getElementById("card-"+id);if(el)el.classList.add("dragging");},0);}
function onDragEnd(e,id){var el=document.getElementById("card-"+id);if(el)el.classList.remove("dragging");clearDropIndicators();dragCardId=null;_dragOverColId=null;_dragOverIdx=null;}
function clearDropIndicators(){document.querySelectorAll(".card-drop-indicator").forEach(function(el){el.classList.remove("active");});}
function onColDragOver(e,colId){e.preventDefault();e.dataTransfer.dropEffect="move";if(!dragCardId)return;var colEl=document.getElementById("col-cards-"+colId);if(!colEl)return;var cardEls=Array.from(colEl.querySelectorAll(".card-item:not(.dragging)"));var idx=cardEls.length;for(var i=0;i<cardEls.length;i++){var rect=cardEls[i].getBoundingClientRect();if(e.clientY<rect.top+rect.height/2){idx=i;break;}}if(_dragOverColId===colId&&_dragOverIdx===idx)return;_dragOverColId=colId;_dragOverIdx=idx;clearDropIndicators();var indEl=document.getElementById("ind-"+colId+"-"+idx);if(indEl)indEl.classList.add("active");}
function onColDragLeave(e,colId){var colEl=document.getElementById("col-cards-"+colId);if(!colEl)return;var rect=colEl.getBoundingClientRect();if(e.clientX<rect.left||e.clientX>rect.right||e.clientY<rect.top||e.clientY>rect.bottom){clearDropIndicators();_dragOverColId=null;_dragOverIdx=null;}}
async function onColDrop(e,colId){
  e.preventDefault();clearDropIndicators();if(!dragCardId)return;
  var card=cards.find(function(c){return c.id===dragCardId;});if(!card){dragCardId=null;return;}
  var targetCol=cards.filter(function(c){return c.status===colId&&c.id!==dragCardId;}).sort(function(a,b){return (a.ordem||0)-(b.ordem||0);});
  var insertIdx=(_dragOverColId===colId&&_dragOverIdx!=null)?_dragOverIdx:targetCol.length;
  var antes=card.status;card.status=colId;
  targetCol.splice(insertIdx,0,card);
  targetCol.forEach(function(c,i){c.ordem=i;});
  try{await Promise.all(targetCol.map(function(c){return dbUpsert(c);}));if(antes!==colId){var al=COLS.find(function(c){return c.id===antes;});var dl=COLS.find(function(c){return c.id===colId;});await dbLog("Moveu demanda",card.titulo+": "+(al?al.label:antes)+" → "+(dl?dl.label:colId));}}catch(err){toast("Erro",true);}
  dragCardId=null;_dragOverColId=null;_dragOverIdx=null;renderKanban();
}

function iniciarRenomearColuna(colId){
  var col=COLS.find(function(c){return c.id===colId;});if(!col)return;
  var titleEl=document.getElementById("col-title-"+colId);if(!titleEl)return;
  titleEl.innerHTML='<input class="col-title-input" id="col-input-'+colId+'" value="'+col.label+'" maxlength="40" onblur="salvarNomeColuna(\''+colId+'\')" onkeydown="if(event.key===\'Enter\')this.blur();if(event.key===\'Escape\')cancelarRenomear(\''+colId+'\')"/>';
  var inp=document.getElementById("col-input-"+colId);if(inp){inp.focus();inp.select();}
}
function cancelarRenomear(colId){var col=COLS.find(function(c){return c.id===colId;});var el=document.getElementById("col-title-"+colId);if(el&&col)el.innerHTML=colTitleInner(col);}
async function salvarNomeColuna(colId){var inp=document.getElementById("col-input-"+colId);if(!inp)return;var nome=(inp.value||"").trim();var col=COLS.find(function(c){return c.id===colId;});if(!col)return;if(nome)col.label=nome;var el=document.getElementById("col-title-"+colId);if(el)el.innerHTML=colTitleInner(col);if(nome)try{await dbSaveCols();}catch(e){}}

function toggleColorPicker(colId,e){e.stopPropagation();if(colorPickerOpen===colId){colorPickerOpen=null;var el=document.getElementById("cpicker-"+colId);if(el)el.remove();return;}colorPickerOpen=colId;var existing=document.querySelector(".col-color-picker");if(existing)existing.remove();var col=COLS.find(function(c){return c.id===colId;});var swatches=COL_COLORS.map(function(cc,i){var active=cc.dot===col.dot?"active":"";return '<div class="color-swatch '+active+'" style="background:'+cc.dot+';" onclick="applyColColor(\''+colId+'\','+i+',event)" title="'+cc.dot+'"></div>';}).join("");var picker=document.createElement("div");picker.className="col-color-picker";picker.id="cpicker-"+colId;picker.innerHTML=swatches;var header=document.getElementById("col-header-"+colId);if(header)header.appendChild(picker);setTimeout(function(){document.addEventListener("click",function h(){colorPickerOpen=null;var p=document.getElementById("cpicker-"+colId);if(p)p.remove();document.removeEventListener("click",h);},true);},10);}
async function applyColColor(colId,idx,e){e.stopPropagation();var col=COLS.find(function(c){return c.id===colId;});if(!col)return;var cc=COL_COLORS[idx];col.dot=cc.dot;col.cover=cc.cover;colorPickerOpen=null;var p=document.getElementById("cpicker-"+colId);if(p)p.remove();try{await dbSaveCols();}catch(err){}renderKanban();}

async function adicionarColuna(){var nome=prompt("Nome da nova coluna:");if(!nome||!nome.trim())return;nome=nome.trim();var id="col_"+uid();var cc=COL_COLORS[COLS.length%COL_COLORS.length];var nova={id,label:nome,dot:cc.dot,cover:cc.cover,badgeBg:"#f1f5f9",badgeText:"#475569",ordem:COLS.length};COLS.push(nova);try{await dbSaveCols();toast("Coluna criada!");}catch(e){toast("Erro",true);}renderKanban();}
async function excluirColuna(colId,e){e.stopPropagation();var col=COLS.find(function(c){return c.id===colId;});if(!col)return;var cardsNaCol=cards.filter(function(c){return c.status===colId;});if(cardsNaCol.length>0){toast("A coluna precisa estar vazia para ser excluída",true);return;}if(!confirm('Excluir a coluna "'+col.label+'"?'))return;COLS=COLS.filter(function(c){return c.id!==colId;});try{await dbSaveCols();toast("Coluna excluída!");}catch(err){toast("Erro",true);}renderKanban();}

// ── LABELS TOGGLE ──
function toggleLabels(cardId,e){e.stopPropagation();labelsExpanded[cardId]=!labelsExpanded[cardId];var el=document.getElementById("card-labels-"+cardId);if(!el)return;var card=cards.find(function(c){return c.id===cardId;});if(card)el.innerHTML=buildLabelsHTML(card);}
function buildLabelsHTML(card){if(!card.tipos||!card.tipos.length)return "";var exp=!!labelsExpanded[card.id];return card.tipos.map(function(t){var c=TC[t]||PALETA[0];if(exp)return '<span class="card-label-bar expanded" style="background:'+c.border+';" onclick="toggleLabels(\''+card.id+'\',event)">'+t+'</span>';return '<span class="card-label-bar" style="background:'+c.border+';" title="'+t+'" onclick="toggleLabels(\''+card.id+'\',event)"></span>';}).join("");}

// ── COMENTÁRIOS ──
function getComments(card){return card.comentarios||[];}
async function addComment(cardId,texto){var card=cards.find(function(c){return c.id===cardId;});if(!card)return;var c=getComments(card);c.push({id:Date.now().toString(),texto,autor:emailUser,data:new Date().toISOString()});card.comentarios=c;await dbUpsert(card);await dbLog("Comentou",card.titulo);}
async function editComment(cardId,commentId,texto){var card=cards.find(function(c){return c.id===cardId;});if(!card)return;card.comentarios=getComments(card).map(function(c){return c.id===commentId?Object.assign({},c,{texto,editado:true}):c;});await dbUpsert(card);}
async function deleteComment(cardId,commentId){var card=cards.find(function(c){return c.id===cardId;});if(!card)return;card.comentarios=getComments(card).filter(function(c){return c.id!==commentId;});await dbUpsert(card);}
function canEditComment(autor){return perfil==="mestre"||(emailUser===autor&&perfil==="advogado");}
function canComment(){return perfil==="mestre"||perfil==="advogado";}

// ── MODAL ──
function openCardModal(id){modalCardId=id;editingCommentId=null;renderModal();}

in("");
  var novoCom=canComment()?'<div style="display:flex;gap:9px;margin-top:6px;"><div style="width:28px;height:28px;border-radius:50%;background:var(--bt-navy);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;">'+emailUser.charAt(0).toUpperCase()+'</div><div style="flex:1;"><div class="comment-wrap"><textarea id="novo-comentario" rows="2" placeholder="Escreva um comentário..."></textarea></div><button class="btn btn-primary" style="font-size:12px;padding:5px 14px;" onclick="submitComentario(\''+id+'\')">Salvar</button></div></div>':"";

  // side
  var sideHTML='<div class="modal-side-label">Ações</div>'
    +(canEdit?'<button class="modal-side-btn" onclick="confirmarExcluirCard(\''+id+'\')" style="color:#dc2626;">'+icon('trash')+' Excluir card</button>':"")
    +'<div class="modal-side-label">Status</div>'
    +(canEdit
      ?'<select class="status-select" style="background:'+col.badgeBg+';color:'+col.badgeText+';" onchange="atualizarStatusModal(\''+id+'\',this.value)">'+sO+'</select>'
      :'<div style="font-size:12px;font-weight:600;padding:7px 10px;border-radius:8px;background:'+col.badgeBg+';color:'+col.badgeText+';display:flex;align-items:center;gap:5px;"><span style="width:7px;height:7px;border-radius:50%;background:'+col.dot+';"></span>'+col.label+'</div>')
    +'<div class="modal-side-label">Etiquetas</div>'
    +(canEdit
      ?'<div style="background:#fff;border-radius:8px;padding:8px;display:flex;flex-wrap:wrap;">'+tiposOpts+'</div>'
      :(card.tipos&&card.tipos.length?'<div style="display:flex;flex-direction:column;gap:4px;">'+card.tipos.map(function(t){var c=TC[t]||PALETA[0];return '<span style="font-size:11px;font-weight:600;padding:5px 9px;border-radius:4px;background:'+c.bg+';border:1px solid '+c.border+';color:'+c.text+';">'+t+'</span>';}).join("")+'</div>':'<span style="font-size:12px;color:var(--text3);">Nenhuma</span>'));

  document.getElementById("modal-container").innerHTML=
    '<div class="modal-overlay" onclick="closeModal(event)">'

    +'<div class="modal-cover" style="background:'+coverColor+';">'
    +'<button class="modal-cover-close" onclick="closeModal()">'+icon('close')+' Fechar</button>'
    +'</div>'
    +'<div class="modal-body">'
    +'<div class="modal-main">'

    // título inline
    +'<div class="modal-section">'
    +(canEdit
      ?'<div onclick="startEditTitle(\''+id+'\')" id="modal-title-display" class="inline-title">'+card.titulo+'</div>'
       +'<textarea id="modal-title-input" class="inline-title-input" rows="2" onblur="saveModalField(\''+id+'\',\'titulo\')" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();this.blur();}">'+card.titulo+'</textarea>'
      :'<div class="inline-title" style="cursor:default;">'+card.titulo+'</div>')
    +'</div>'

    // observações
    +'<div class="modal-section">'
    +'<div class="modal-sec-title">'+icon('edit')+' Observações</div>'
    +(canEdit
      ?'<div class="obs-block" id="obs-block-'+id+'" onclick="startEditObs(\''+id+'\')">'
        +(card.obs?'<div class="obs-text" id="obs-text-'+id+'">'+card.obs+'</div>':'<div class="obs-placeholder" id="obs-text-'+id+'">Clique para adicionar observações...</div>')
        +'<textarea id="obs-input-'+id+'" class="obs-textarea" style="display:none;" onblur="saveModalField(\''+id+'\',\'obs\')" placeholder="Escreva observações...">'+  (card.obs||"")+'</textarea>'
        +'</div>'
      :(card.obs?'<div class="obs-block" style="cursor:default;"><div class="obs-text">'+card.obs+'</div></div>':''))
    +'</div>'

    // detalhes inline
    +'<div class="modal-section">'
    +'<div class="modal-sec-title">'+icon('briefcase')+' Detalhes</div>'
    +'<div class="info-grid">'
    +infoCell(id,'clienteNum','Cliente',card.clienteNum?(card.clienteNum+(cliNome?" — "+cliNome:"")):"—",canEdit,'number')
    +infoCell(id,'casoNum','Caso',card.casoNum?(card.casoNum+(cDesc?" — "+trunc(cDesc,40):"")):"—",canEdit,'number')
    +infoCell(id,'responsavel','Responsável',card.responsavel||"—",canEdit,'select-resp',rO)
    +infoCell(id,'email','E-mail ref.',trunc(card.email,35)||"—",canEdit,'text')
    +infoCell(id,'dataInicio','Início',card.dataInicio||"—",canEdit,'date')
    +infoCell(id,'dataFim','Encerramento',card.dataFim||"—",canEdit,'date')
    +infoCell(id,'horas','Horas',card.horas?(card.horas+"h"):"—",canEdit,'number-step')
    +'</div>'
    +'</div>'

    // comentários
    +'<div class="modal-section">'
    +'<div class="modal-sec-title">'+icon('comment')+' Comentários <span style="background:#fff;border-radius:20px;padding:1px 7px;font-size:11px;font-weight:500;margin-left:3px;">'+comentarios.length+'</span></div>'
    +commHTML+novoCom

}

function infoCell(cardId,field,label,val,canEdit,type,extra){
  var inputHTML="";
  if(canEdit){
    if(type==="number")inputHTML='<input type="number" id="ic-'+field+'" value="'+(val==="—"?"":val.toString().replace(/\D.*$/,""))+'" min="1" onblur="saveModalField(\''+cardId+'\',\''+field+'\')" onkeydown="if(event.key===\'Enter\')this.blur()" style="margin-top:3px;"/>';
    else if(type==="number-step")inputHTML='<input type="number" id="ic-'+field+'" value="'+(val==="—"?"":val.replace("h",""))+'" min="0" step="0.5" onblur="saveModalField(\''+cardId+'\',\''+field+'\')" onkeydown="if(event.key===\'Enter\')this.blur()" style="margin-top:3px;"/>';
    else if(type==="date")inputHTML='<input type="date" id="ic-'+field+'" value="'+(val==="—"?"":val)+'" onchange="saveModalField(\''+cardId+'\',\''+field+'\')" style="margin-top:3px;"/>';
    else if(type==="select-resp")inputHTML='<select id="ic-'+field+'" onchange="saveModalField(\''+cardId+'\',\''+field+'\')" style="margin-top:3px;">'+(extra||"")+'</select>';
    else inputHTML='<input type="text" id="ic-'+field+'" value="'+(val==="—"?"":val)+'" onblur="saveModalField(\''+cardId+'\',\''+field+'\')" onkeydown="if(event.key===\'Enter\')this.blur()" style="margin-top:3px;"/>';
  }
  return '<div class="info-cell '+(canEdit?"":"")+ '" id="ic-wrap-'+field+'" onclick="focusInfoCell(\''+field+'\')" style="'+(canEdit?"":"cursor:default;")+'">'
    +'<div class="info-cell-label">'+label+'</div>'
    +'<div class="info-cell-val" id="ic-val-'+field+'">'+val+'</div>'
    +(canEdit?'<div id="ic-input-wrap-'+field+'" style="display:none;">'+inputHTML+'</div>':"")
    +'</div>';
}
function focusInfoCell(field){
  var wrap=document.getElementById("ic-input-wrap-"+field);
  var valEl=document.getElementById("ic-val-"+field);
  var cellEl=document.getElementById("ic-wrap-"+field);
  if(!wrap)return;
  var isOpen=wrap.style.display!=="none";
  // close all others
  document.querySelectorAll("[id^='ic-input-wrap-']").forEach(function(el){el.style.display="none";});
  document.querySelectorAll("[id^='ic-val-']").forEach(function(el){el.style.display="";});
  document.querySelectorAll(".info-cell").forEach(function(el){el.classList.remove("editing");});
  if(!isOpen){
    wrap.style.display="block";
    if(valEl)valEl.style.display="none";
    if(cellEl)cellEl.classList.add("editing");
    var inp=wrap.querySelector("input,select,textarea");if(inp){inp.focus();}
  }
}
async function saveModalField(cardId,field){
  var card=cards.find(function(c){return c.id===cardId;});if(!card)return;
  var inp=document.getElementById("ic-"+field);
  var val=inp?inp.value:"";
  if(field==="titulo"){
    var ta=document.getElementById("modal-title-input");
    val=(ta?ta.value:"").trim();
    if(!val){toast("Título não pode ser vazio",true);return;}
    card.titulo=val;
    var disp=document.getElementById("modal-title-display");
    if(disp)disp.textContent=val;
    stopEditTitle();
  } else if(field==="obs"){
    var ta=document.getElementById("obs-input-"+cardId);
    val=ta?ta.value:"";
    card.obs=val;
    stopEditObs(cardId,val);
  } else if(field==="clienteNum"||field==="casoNum"||field==="horas"){
    card[field]=val?parseFloat(val):null;
  } else {
    card[field]=val||null;
  }
  // update display val
  var valEl=document.getElementById("ic-val-"+field);
  if(valEl){
    var disp2=card[field]||(card[field]===0?"0":"—");
    if(field==="horas"&&card[field])disp2=card[field]+"h";
    valEl.textContent=String(disp2);
    valEl.style.display="";
  }
  var wrap=document.getElementById("ic-input-wrap-"+field);if(wrap)wrap.style.display="none";
  var cellEl=document.getElementById("ic-wrap-"+field);if(cellEl)cellEl.classList.remove("editing");
  try{await dbUpsert(card);}catch(e){toast("Erro ao salvar",true);}
  // update card in board without re-rendering
}
function startEditTitle(cardId){
  var disp=document.getElementById("modal-title-display");
  var inp=document.getElementById("modal-title-input");
  if(!disp||!inp)return;
  disp.classList.add("editing");
  inp.classList.add("editing");
  inp.focus();inp.select();
}
function stopEditTitle(){
  var disp=document.getElementById("modal-title-display");
  var inp=document.getElementById("modal-title-input");
  if(disp)disp.classList.remove("editing");
  if(inp)inp.classList.remove("editing");
}
function startEditObs(cardId){
  var block=document.getElementById("obs-block-"+cardId);
  var textEl=document.getElementById("obs-text-"+cardId);
  var inpEl=document.getElementById("obs-input-"+cardId);
  if(!block||!inpEl)return;
  block.classList.add("editing");
  if(textEl)textEl.style.display="none";
  inpEl.style.display="block";
  inpEl.focus();
}
function stopEditObs(cardId,val){
  var block=document.getElementById("obs-block-"+cardId);
  var textEl=document.getElementById("obs-text-"+cardId);
  var inpEl=document.getElementById("obs-input-"+cardId);
  if(block)block.classList.remove("editing");
  if(inpEl)inpEl.style.display="none";
  if(textEl){
    textEl.style.display="";
    if(val){textEl.className="obs-text";textEl.textContent=val;}
    else{textEl.className="obs-placeholder";textEl.textContent="Clique para adicionar observações...";}
  }
}
async function toggleModalTipo(cardId,tipo){
  var card=cards.find(function(c){return c.id===cardId;});if(!card)return;
  card.tipos=card.tipos||[];
  var idx=card.tipos.indexOf(tipo);
  if(idx>=0)card.tipos.splice(idx,1);else card.tipos.push(tipo);
  try{await dbUpsert(card);}catch(e){toast("Erro",true);}
  // update cover
  var coverColor=getCardCoverColor(card);
  var modalCover=document.querySelector(".modal-cover");
  if(modalCover)modalCover.style.background=coverColor;
}
async function atualizarStatusModal(cardId,novoStatus){
  var card=cards.find(function(c){return c.id===cardId;});if(!card)return;
  card.status=novoStatus;
  try{await dbUpsert(card);toast("Status atualizado!");}catch(e){toast("Erro",true);}
}
async function confirmarExcluirCard(id){if(!confirm("Excluir esta demanda?"))return;var card=cards.find(function(c){return c.id===id;});try{await dbDelete(id);await dbLog("Excluiu demanda",card?card.titulo:id);cards=cards.filter(function(c){return c.id!==id;});closeModal();renderView();}catch(e){toast("Erro",true);}}

function closeModal(e){if(e&&e.target!==document.querySelector(".modal-overlay"))return;document.getElementById("modal-container").innerHTML="";}
async function submitComentario(cardId){var el=document.getElementById("novo-comentario");var texto=(el?el.value:"").trim();if(!texto){toast("Escreva um comentário",true);return;}try{await addComment(cardId,texto);toast("Adicionado!");renderModal();}catch(e){toast("Erro",true);}}
function iniciarEdicaoComentario(cid){editingCommentId=cid;renderModal();}
function cancelarEdicaoComentario(){editingCommentId=null;renderModal();}
async function salvarEdicaoComentario(cardId,commentId){var el=document.getElementById("edit-comment-text");var texto=(el?el.value:"").trim();if(!texto){toast("Não pode ser vazio",true);return;}try{await editComment(cardId,commentId,texto);toast("Atualizado!");editingCommentId=null;renderModal();}catch(e){toast("Erro",true);}}
async function confirmarExcluirComentario(commentId){if(!confirm("Excluir este comentário?"))return;try{await deleteComment(modalCardId,commentId);toast("Excluído!");editingCommentId=null;renderModal();}catch(e){toast("Erro",true);}}

// ── KANBAN ──
function renderView(){if(viewMode==="lista")renderLista();else renderKanban();}

function buildCardHTML(card,canEdit){
  var nc=(card.comentarios||[]).length;
  var cover=getCardCoverColor(card);
  var labelsHTML=buildLabelsHTML(card);
  var cc=ccLabelHTML(card);
  var obsPreview=card.obs?'<div class="card-obs">'+trunc(card.obs,90)+'</div>':"";
  return '<div class="card-item" id="card-'+card.id+'" draggable="'+(canEdit?"true":"false")+'"'
    +(canEdit?' ondragstart="onDragStart(event,\''+card.id+'\')" ondragend="onDragEnd(event,\''+card.id+'\')"':"")
    +' onclick="openCardModal(\''+card.id+'\')">'
    +'<div class="card-cover" style="background:'+cover+';"></div>'

async function renderUsuarios(){var app=document.getElementById("app");app.className="page-mode";app.innerHTML=headerHTML("usuarios")+'<div style="padding:24px;max-width:900px;margin:0 auto;"><div style="text-align:center;padding:40px;color:var(--text3);">Carregando...</div></div>';try{var us=await dbFetchUsuarios();var rows=us.map(function(u){var b=u.perfil==="mestre"?'<span class="badge" style="background:rgba(168,85,247,.1);color:#7c3aed;">Mestre</span>':u.perfil==="advogado"?'<span class="badge" style="background:rgba(250,81,14,.1);color:var(--bt-orange);">Advogado</span>':'<span class="badge" style="background:var(--surface);color:#64748b;border:1px solid var(--border);">Cliente</span>';var isMestre=u.perfil==="mestre";var ac=isMestre?'<span style="font-size:11px;color:var(--text3);">conta principal</span>':'<div style="display:flex;gap:5px;"><button onclick="abrirModalUsuario(\''+u.id+'\',\''+escQ(u.nome)+'\',\''+u.email+'\',\''+u.perfil+'\',\''+(u.sigla||'')+'\')" style="font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:3px;">'+icon('edit')+' Editar</button><button onclick="deletarUsuario(\''+u.id+'\',\''+escQ(u.nome)+'\')" style="font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid #fecaca;background:#fff;color:#dc2626;cursor:pointer;display:flex;align-items:center;gap:3px;">'+icon('trash')+' Excluir</button></div>';return '<tr style="border-bottom:1px solid var(--border);transition:background .15s;" onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'\'"><td style="padding:11px 14px;font-size:13px;font-weight:600;color:var(--bt-navy);">'+u.nome+'</td><td style="padding:11px 14px;font-size:13px;color:var(--text2);">'+u.email+'</td><td style="padding:11px 14px;">'+b+'</td><td style="padding:11px 14px;font-size:12px;font-weight:700;color:var(--bt-navy);">'+(u.sigla||'—')+'</td><td style="padding:11px 1 function abrirModalUsuario(id,nome,email,perf,sigla){var isEdit=!!id;document.getElementById("modal-container").innerHTML='<div class="modal-overlay" onclick="closeModal(event)"><div class="modal-box" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;"><div style="font-size:16px;font-weight:700;color:var(--bt-navy);">'+(isEdit?"Editar usuário":"Novo usuário")+'</div><button onclick="closeModal()" style="background:var(--surface);border:1px solid var(--border);color:var(--text3);padding:5px;border-radius:7px;cursor:pointer;">'+icon('close')+'</button></div><div class="field"><label>Nome</label><input id="mu-nome" value="'+(nome||"")+'" placeholder="Nome completo"/></div><div class="field"><label>E-mail</label><input id="mu-email" type="email" value="'+(email||"")+'" placeholder="email@btlaw.com.br"/></div><div class="field"><label>'+(isEdit?"Nova senha (deixe vazio para manter)":"Senha")+'</label><input id="mu-senha" type="password" placeholder="'+(isEdit?"Nova senha...":"Senha de acesso...")+'"/></div><div class="field"><label>Perfil</label><select id="mu-perfil" onchange="toggleSigla()" style="width:100%;"><option value="advogado"'+(perf==="advogado"?" selected":"")+'>Advogado</option><option value="cliente"'+(perf==="cliente"?" selected":"")+'>Cliente</option></select></div><div class="field" id="sigla-field" style="'+((!perf||perf==="cliente")?"display:none;":"")+'"><label>Sigla</label><input id="mu-sigla" value="'+(sigla||"")+'" placeholder="Ex: VOL" style="max-width:120px;text-transform:uppercase;"/></div><div style="display:flex;gap:8px;justify-content:flex-end;"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarUsuario(\''+(id||"")+'\')">Salvar</button></div></div></div>';}
function toggleSigla(){var p=document.getElementById("mu-perfil").value;var f=document.getElementById("sigla-field");if(f)f.style.display=p==="advogado"?"":"none";}
async function salvarUsuario(id){var nome=(document.getElementById("mu-nome").value||"").trim();var email=(document.getElementById("mu-email").value||"").trim().toLowerCase();var senha=document.getElementById("mu-senha").value;var perf=document.getElementById("mu-perfil").value;var siglEl=document.getElementById("mu-sigla");var sigla=siglEl?(siglEl.value||"").trim().toUpperCase():"";if(!nome||!email){toast("Preencha nome e e-mail",true);return;}if(!id&&!senha){toast("Informe a senha",true);return;}var u={nome,email,perfil:perf,ativo:true,sigla:(perf==="advogado"||perf==="mestre")?sigla:null};if(id)u.id=id;if(senha)u.senha=senha;try{await dbSaveUsuario(u);await dbLog(id?"Editou usuário":"Criou usuário",nome);await loadResponsaveis();toast(id?"Atualizado!":"Criado!");closeModal();renderUsuarios();}catch(e){toast("Erro",true);}}
async function deletarUsuario(id,nome){if(!confirm('Excluir "'+nome+'"?'))return;try{await dbDeleteUsuario(id);await dbLog("Excluiu usuário",nome);await loadResponsaveis();toast("Excluído!");renderUsuarios();}catch(e){toast("Erro",true);}}
async function deleteCard(id){if(!confirm("Excluir esta demanda?"))return;var card=cards.find(function(c){return c.id===id;});try{await dbDelete(id);await dbLog("Excluiu demanda",card?card.titulo:id);cards=cards.filter(function(c){return c.id!==id;});renderView();}catch(e){toast("Erro",true);}}

// ── AUTOCOMPLETE ──
function buildAcList(q){if(!q||q.length<1)return [];var ql=q.toLowerCase();return clientesDB.filter(function(c){return String(c.numero).startsWith(ql)||(c.nome&&c.nome.toLowerCase().includes(ql));}).slice(0,8);}
function renderAcList(m){var list=document.getElementById("ac-list");if(!list)return;if(!m||!m.length){list.style.display="none";acIndex=-1;return;}list.innerHTML=m.map(function(c,i){return '<div class="autocomplete-item" id="ac-item-'+i+'" onmousedown="selectCliente('+c.numero+')" onmouseover="acIndex='+i+';highlightAc()"><strong>'+c.numero+'</strong>'+(c.nome?' — '+trunc(c.nome,40):'')+'</div>';}).join("");list.style.display="block";acIndex=-1;}
function highlightAc(){document.querySelectorAll(".autocomplete-item").forEach(function(el,i){el.classList.toggle("active",i===acIndex);});}
function onClienteInput(val){renderAcList(buildAcList(val));updateFormCaso(null);}
function onClienteKeydown(e){var list=document.getElementById("ac-list");var items=list?list.querySelectorAll(".autocomplete-item"):[];if(e.key==="ArrowDown"){e.preventDefault();acIndex=Math.min(acIndex+1,items.length-1);highlightAc();}else if(e.key==="ArrowUp"){e.preventDefault();acIndex=Math.max(acIndex-1,0);highlightAc();}else if(e.key==="Enter"&&acIndex>=0){e.preventDefault();var m=buildAcList(document.getElementById("f-cliente-text").value||"");if(m[acIndex])selectCliente(m[acIndex].numero);}else if(e.key==="Escape"){hideAc();}}
function hideAc(){var list=document.getElementById("ac-list");if(list)list.style.display="none";acIndex=-1;}
function selectCliente(num){var c=clientesDB.find(function(x){return x.numero===num;});var inp=document.getElementById("f-cliente-text");var hid=document.getElementById("f-cliente");if(inp)inp.value=num+(c&&c.nome?" — "+c.nome:"");if(hid)hid.value=num;hideAc();updateFormCaso(num);}
function updateFormCaso(cliNum){var wrap=document.getElementById("caso-cascade-wrap");if(!wrap)return;var casos=cliNum?casosDoCliente(parseInt(cliNum)):[];if(casos.length>0){wrap.innerHTML='<select id="f-caso" style="width:100%;"><option value="">Selecione o caso...</option>'+casos.map(function(c){return '<option value="'+c.numero+'">'+c.numero+(c.descricao?' — '+trunc(c.descricao,40):'')+'</option>';}).join("")+'</select>';}else{wrap.innerHTML='<input id="f-caso" type="number" min="1" max="9999" value="" placeholder="Ex: 745"/>';}}

// ── FORM (nova demanda) ──
function renderForm(){
  var app=document.getElementById("app");app.className="page-mode";
  var card=editingId?cards.find(function(c){return c.id===editingId;}):null;
  var v=card||{titulo:"",responsavel:"",email:"",dataInicio:new Date().toISOString().split("T")[0],dataFim:"",horas:"",obs:"",tipos:[],status:COLS[0]?COLS[0].id:"aberto",clienteNum:null,casoNum:null};
  var tBtns=TIPOS.map(function(t){var sel=formTipos.includes(t),c=TC[t];return '<button type="button" onclick="toggleTipo(\''+t+'\')" id="tipo-'+t+'" style="font-size:12px;font-weight:600;padding:4px 12px;border-radius:4px;cursor:pointer;background:'+(sel?c.bg:'var(--surface)')+';border:'+(sel?'1.5px solid '+c.border:'1.5px solid var(--border)')+';color:'+(sel?c.text:'var(--text2)')+';transition:all .15s;">'+t+'</button>';}).join("");
  var rO=responsaveis.map(function(r){return '<option value="'+r+'"'+(v.responsavel===r?' selected':'')+'>'+r+'</option>';}).join("");
  var sO=COLS.map(function(c){return '<option value="'+c.id+'"'+(v.status===c.id?' selected':'')+'>'+c.label+'</option>';}).join("");
  var cliTextVal="";if(v.clienteNum){var cliObj=clientesDB.find(function(c){return c.numero===v.clienteNum;});cliTextVal=v.clienteNum+(cliObj&&cliObj.nome?" — "+cliObj.nome:"");}
  var casos=v.clienteNum?casosDoCliente(parseInt(v.clienteNum)):[];
  var casoFieldInner=casos.length>0?'<select id="f-caso" style="width:100%;"><option value="">Selecione o caso...</option>'+casos.map(function(c){return '<option value="'+c.numero+'"'+(String(v.casoNum)===String(c.numero)?' selected':'')+'>'+c.numero+(c.descricao?' — '+trunc(c.descricao,40):'')+'</option>';}).join("")+'</select>':'<input id="f-caso" type="number" min="1" max="9999" value="'+(v.casoNum||"")+'" placeholder="Ex: 745"/>';
  app.innerHTML='<div style="background:var(--surface);min-height:100vh;padding-bottom:40px;"><div style="background:linear-gradient(135deg,#1a2e3a,#253f4f);height:52px;padding:0 14px;display:flex;align-items:center;gap:14px;"><button onclick="renderView()" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75);font-size:13px;font-weight:500;padding:5px 12px;border-radius:7px;font-family:inherit;">'+icon('back')+' Voltar</button><span style="color:rgba(255,255,255,.25);">/</span><span style="color:#fff;font-weight:600;font-size:14px;">'+(editingId?"Editar demanda":"Nova demanda")+'</span></div><div style="max-width:560px;margin:22px auto;padding:0 14px;"><div style="background:#fff;border-radius:14px;border:1px solid var(--border);padding:24px 28px;box-shadow:var(--shadow-md);"><div class="field"><label>Título *</label><input id="f-titulo" value="'+v.titulo+'" placeholder="Ex: Análise de contrato CRI"/></div><div class="field"><label>Cliente</label><div class="autocomplete-wrap"><input id="f-cliente-text" autocomplete="off" value="'+cliTextVal+'" placeholder="Digite nome ou número..." oninput="onClienteInput(this.value)" onkeydown="onClienteKeydown(event)" onblur="setTimeout(hideAc,150)"/><input type="hidden" id="f-cliente" value="'+(v.clienteNum||"")+'"/><div id="ac-list" class="autocomplete-list" style="display:none;"></div></div></div><div class="field"><label>Caso</label><div id="caso-cascade-wrap">'+casoFieldInner+'</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;" class="field"><div><label>Responsável</label><select id="f-responsavel" style="width:100%;"><option value="">Selecione...</option>'+rO+'</select></div><div><label>Status</label><select id="f-status" style="width:100%;">'+sO+'</select></div></div><div class="field"><label>E-mail da solicitação</label><input id="f-email" value="'+(v.email||"")+'" placeholder="Ex: Fwd: Assembleia Geral"/></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;" class="field"><div><label>Início</label><input type="date" id="f-dataInicio" value="'+(v.dataInicio||"")+'"/></div><div><label>Encerramento</label><input type="date" id="f-dataFim" value="'+(v.dataFim||"")+'"/></div><div><label>Horas</label><input type="number" id="f-horas" value="'+(v.horas||"")+'" placeholder="Ex: 2.5" step="0.5"/></div></div><div class="field"><label>Tipo(s)</label><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;">'+tBtns+'</div></div><div class="field"><label>Observações</label><textarea id="f-obs" rows="3" style="resize:vertical;line-height:1.6;">'+(v.obs||"")+'</textarea></div><div style="height:1px;background:var(--border);margin:16px 0;"></div><div style="display:flex;gap:9px;justify-content:flex-end;"><button class="btn" onclick="renderView()">Cancelar</button><button class="btn btn-primary" onclick="saveCard()" style="display:flex;align-items:center;gap:5px;">'+icon('spark')+' Salvar demanda</button></div></div></div></div>';
}
function toggleTipo(t){var idx=formTipos.indexOf(t);if(idx>=0)formTipos.splice(idx,1);else formTipos.push(t);var c=TC[t],sel=formTipos.includes(t),btn=document.getElementById("tipo-"+t);if(!btn)return;btn.style.background=sel?c.bg:"var(--surface)";btn.style.border=sel?"1.5px solid "+c.border:"1.5px solid var(--border)";btn.style.color=sel?c.text:"var(--text2)";}
function openNew(){editingId=null;formTipos=[];renderForm();}
function openEdit(id){editingId=id;var card=cards.find(function(c){return c.id===id;});formTipos=card&&card.tipos?card.tipos.slice():[];renderForm();}
async function saveCard(){
  var titulo=(document.getElementById("f-titulo").value||"").trim();if(!titulo){toast("Informe o título",true);return;}
  var id=editingId||Date.now().toString();var existing=editingId?cards.find(function(c){return c.id===editingId;}):null;
  var cliVal=document.getElementById("f-cliente").value;var casoEl=document.getElementById("f-caso");var casoVal=casoEl?casoEl.value:"";
  var card={id,titulo,clienteNum:cliVal?parseInt(cliVal):null,casoNum:casoVal?parseInt(casoVal):null,responsavel:document.getElementById("f-responsavel").value,status:document.getElementById("f-status").value,email:document.getElementById("f-email").value,dataInicio:document.getElementById("f-dataInicio").value,dataFim:document.getElementById("f-dataFim").value,horas:document.getElementById("f-horas").value,obs:document.getElementById("f-obs").value,tipos:formTipos.slice(),comentarios:existing?existing.comentarios||[]:[]};
  if(existing)card.ordem=existing.ordem||0;else{var colCards=cards.filter(function(c){return c.status===card.status;});card.ordem=colCards.length;}
  try{await dbUpsert(card);await dbLog(editingId?"Editou demanda":"Criou demanda",titulo);if(editingId){cards=cards.map(function(c){return c.id===editingId?card:c;});}else cards.push(card);toast("Salvo!");editingId=null;renderView();}catch(e){toast("Erro",true);}
}

// ── INIT ──
async function init(){
  var app=document.getElementById("app");app.className="";
  app.innerHTML='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;"><div style="width:44px;height:44px;border-radius:13px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;"><span style="font-size:17px;font-weight:800;color:#fff;">BT</span></div><div style="width:28px;height:3px;background:linear-gradient(90deg,#ff8204,#e20500);border-radius:2px;animation:pulse 1.5s ease-in-out infinite;"></div><style>@keyframes pulse{0%,100%{opacity:.4;transform:scaleX(.8)}50%{opacity:1;transform:scaleX(1)}}</style><div style="font-size:13px;color:rgba(255,255,255,.35);">Carregando BTDesk...</div></div>';
  try{await Promise.all([loadResponsaveis(),loadClientes(),loadCasos(),dbLoadCols()]);cards=await dbFetch();cards=cards.filter(function(c){return c.id!=="__cols__";});}catch(e){toast("Erro ao carregar",true);}
  loadEtiquetas();renderKanban();
}
if(checkAuth()){loadEtiquetas();init();}else{renderLogin();}
</script>
</body>
</html>
